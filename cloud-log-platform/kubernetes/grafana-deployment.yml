apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cloud-log-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
      volumes:
        - name: grafana-provisioning-datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: prometheus-datasource.yml
                path: prometheus-datasource.yml
        - name: grafana-provisioning-dashboards
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboard-provider.yml
                path: dashboard-provider.yml
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: cloud-log-platform
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
